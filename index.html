<body>

<div class="page-wrapper">
  <!-- Main Navigation Tabs (Outside Container) -->

  <div class="shop-header">
  </div>

  <div class="panel">

      <!-- Gacha Section -->

        <!-- Gacha Main Tabs -->

        <!-- Dynamic Gacha Header -->

        </div>
        
        <!-- Pokedoll Gacha Content -->
        <div id="pokedollGacha" class="gacha-content active">
          <!-- Collection Counter -->
          <div class="collection-header">
            <div class="collection-counter">
              <span id="collectionCounter">Loading...</span>

          </div>
          
          <!-- Pokedoll Rarity Tabs -->
          <div class="gacha-rarity-tabs">
            <button class="rarity-tab active" data-rarity="1">

            <button class="rarity-tab" data-rarity="2">

            <button class="rarity-tab" data-rarity="3">

        <!-- Item Gacha Content -->

              <span class="rarity-name">Pokeball</span>

        <!-- Spawn Gacha Content -->

          <!-- Search Bar -->

          </div>

    <div class="main-content">

        </div>

        <div class="content-wrapper">
          <div class="filter-sidebar">
            <div class="filter-title">Categories</div>
            <div class="filter-tabs" id="filterTabs">
            </div>
            <div class="shop-villager">
              <img src="shop.png" alt="Shop Villager">
            </div>
          </div>

          <div class="items-section">
            <div class="section-header">
              <div class="stats-bar">
                <div id="statsText">Loading...</div>
              </div>

              </div>

            <div class="item-list" id="itemList">

    </div>

<script>
// ── CONFIG ──
const PER_PAGE = 15;
let BANK = [];
let DEFAULT_SHOP = [];
let page = 1, filter = 'all', query = '';
let sortOrder = 'desc'; // 'asc' or 'desc'
let currentMode = 'sell'; // 'sell' or 'buy'
let currentSection = 'shop'; // 'shop' or 'gacha'
let lastShopMode = 'sell'; // Track last shop mode when switching sections

// ── LOAD bank.json AND default_shop.json ──
Promise.all([
  fetch('bank.json?t=' + Date.now()).then(r => {
    if (!r.ok) throw new Error('Could not load bank.json');
    return r.json();
  }),
  fetch('default_shop.json').then(r => {
    if (!r.ok) throw new Error('Could not load default_shop.json');
    return r.json();
  })
])
.then(([bankData, shopData]) => {
  BANK = bankData.bank;
  DEFAULT_SHOP = shopData.defaultShop;
  
  updateCategories('sell');
  render();
})
.catch(err => {
  const errorElement = document.getElementById('itemList');
  if (errorElement) {
    errorElement.innerHTML =
      `<div class="no-results"><div class="icon">❌</div>Failed to load data<br><small style="font-size:13px;opacity:0.5">${err.message}</small></div>`;
  }
});

// ── ITEM IMAGE ──
// Tries GitHub raw Minecraft assets first, falls back to wiki, then a plain square
function makeImgEl(itemId) {
  const [ns, name] = itemId.split(':');
  const el = document.createElement('img');
  el.className = 'item-icon';
  el.alt = name;
  
  // Special handling for gacha coins
  if (name === 'gacha_coin_7') {
    el.src = 'gacha coin blue.png';
    el.onerror = function() {
      el.outerHTML = '<div class="item-icon-fallback">🔵</div>';
    };
    return el;
  }
  if (name === 'gacha_coin') {
    el.src = 'gacha coin red.png';
    el.onerror = function() {
      el.outerHTML = '<div class="item-icon-fallback">🔴</div>';
    };
    return el;
  }
  if (name === 'gacha_coin_4') {
    el.src = 'gacha coin rainbow.png';
    el.onerror = function() {
      el.outerHTML = '<div class="item-icon-fallback">🌈</div>';
    };
    return el;
  }

  if (ns === 'minecraft') {
    // Handle special cases first
    if (name === 'redstone_wire') {
      el.src = 'https://minecraft.wiki/images/Invicon_Redstone.png';
      el.onerror = function() {
        el.outerHTML = '<div class="item-icon-fallback">📦</div>';
      };
      return el;
    }
    
    // Handle block naming (e.g., emerald_block -> block_of_emerald)
    let textureName = name;
    if (name.includes('_block')) {
      const baseName = name.replace('_block', '');
      // For GitHub assets, use lowercase; for wiki fallback, we'll handle in onerror
      textureName = `block_of_${baseName}`;
    }
    
    // Try item textures first, then block textures, then wiki
    el.src = `https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20.1/assets/minecraft/textures/item/${textureName}.png`;
    let tries = 0;
    el.onerror = function() {
      tries++;
      if (tries === 1) {
        // Try block textures folder
        el.src = `https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20.1/assets/minecraft/textures/block/${name}.png`;
      } else if (tries === 2) {
        // Proper capitalization for wiki URLs: Block_of_Iron instead of block_of_iron
        const wiki = textureName.split('_').map(w => w[0].toUpperCase() + w.slice(1)).join('_');
        el.src = `https://minecraft.wiki/images/Invicon_${wiki}.png`;
      } else {
        el.outerHTML = '<div class="item-icon-fallback">📦</div>';
      }
    };
  } else {
    // cobblemon / lumymon
    el.src = `https://mc.nbs.gg/items/${ns}/${name}.png`;
    let tries = 0;
    el.onerror = function() {
      tries++;
      if (tries === 1) {
        // Special cases for relic coin items
        if (name === 'relic_coin_sack') {
          el.src = 'https://wiki.cobblemon.com/images/a/a7/Relic_Coin_Sack_%28block%29.png';
        } else if (name === 'relic_coin_pouch') {
          el.src = 'https://wiki.cobblemon.com/images/1/18/Relic_Coin_Pouch.png';
        } else if (name === 'relic_coin') {
          el.src = 'https://wiki.cobblemon.com/images/1/15/Relic_Coin.png';
        } else {
          // Try Serebii item sprites for berries and items
          if (name.includes('berry')) {
            const berryName = name.replace('_berry', '').toLowerCase();
            el.src = `https://www.serebii.net/itemdex/sprites/${berryName}berry.png`;
          } else {
            // Try Serebii item sprites for other items
            const itemName = name.replace(/_/g, '').toLowerCase();
            el.src = `https://www.serebii.net/itemdex/sprites/${itemName}.png`;
          }
        }
      } else if (tries === 2) {
        // Try PokeAPI berries for berry items
        if (name.includes('berry')) {
          const berryName = name.replace('_berry', '').replace(/_/g, '-').toLowerCase();
          el.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/berries/${berryName}-berry.png`;
        } else {
          // Try PokeAPI sprites for other items/pokemon
          const itemName = name.replace(/_/g, '-').toLowerCase();
          el.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${itemName}.png`;
        }
      } else if (tries === 3) {
        // Try generic item sprites
        const itemName = name.replace(/_/g, '-').toLowerCase();
        el.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/${itemName}.png`;
      } else {
        el.outerHTML = '<div class="item-icon-fallback">❓</div>';
      }
    };
  }
  return el;
}

// ── HELPERS ──
function formatName(itemId) {
  const baseName = itemId.split(':')[1].replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  
  // Rename gacha coins for display
  if (baseName === 'Gacha Coin 7') return 'Blue Gacha Coin';
  if (baseName === 'Gacha Coin') return 'Red Gacha Coin';
  if (baseName === 'Gacha Coin 4') return 'Rainbow Gacha Coin';
  
  return baseName;
}
function getNs(itemId) { return itemId.split(':')[0]; }
function nsBadge(ns) {
  if (ns === 'cobblemon') return '🔴';
  if (ns === 'lumymon')   return '🌙';
  return '';
}

function matchFilter(item, f) {
  const [ns, name] = item.item.split(':');
  switch(f) {
    case 'all': return true;
    case 'vanilla': return ns === 'minecraft';
    case 'cobblemon': return ns === 'cobblemon' || ns === 'lumymon';
    case 'berry': return name.includes('berry') && !['candied_berry','berry_sweet','strawberry_sweet'].some(k => name.includes(k));
    case 'ball': return name.includes('_ball') || name.includes('ball') && (ns === 'cobblemon' || ns === 'lumymon' || ns === 'minecraft');
    case 'health': return (ns === 'cobblemon' || ns === 'lumymon') && ['potion','elixir','ether','revive','antidote','awakening','burn_heal','ice_heal','paralyze','full_heal','restore','heal_powder','revival_herb'].some(k => name.includes(k));
    case 'evolution': return (ns === 'cobblemon' || ns === 'lumymon') && ['stone','_scale','cable','metal_coat','armor','scroll','_apple','_sweet','razor','kings_rock','dragon_scale','electirizer','magmarizer','upgrade','dubious','peat_block','prism','reaper','deep_sea','sachet','whipped','tart','syrupy','cracked_pot','chipped_pot','teacup','augurite','protector','galarica'].some(k => name.includes(k));
    case 'food': return ['apple','bread','cake','cookie','pumpkin_pie','cooked','beef','porkchop','chicken','mutton','rabbit','cod','salmon','tropical','pufferfish','rotten_flesh','spider_eye','carrot','potato','baked_potato','poisonous','golden_apple','golden_carrot','melon_slice','dried_kelp','beetroot','beetroot_soup','mushroom_stew','suspicious_stew','rabbit_stew'].some(k => name.includes(k));
    case 'ore': return ns === 'minecraft' && ['_ore','debris','_ingot','_nugget','raw_iron','raw_gold','raw_copper','diamond','emerald','coal','quartz','lapis','redstone','netherite','iron_block','gold_block','emerald_block','diamond_block','coal_block','lapis_block','redstone_block','quartz_block','netherite_block'].some(k => name.includes(k)) && !['stairs','slab','wall','fence','gate','brick','pillar','chiseled','polished','cut','smooth','tile','torch','lamp','horse_armor'].some(k => name.includes(k));
    case 'armor_tools': return ['sword','pickaxe','_axe','shovel','_hoe','bow','crossbow','trident','fishing_rod','shears','helmet','chestplate','leggings','boots','shield','elytra','turtle_helmet'].some(k => name.includes(k)) && !name.includes('shell_helmet');
    default: return true;
  }
}

function getFiltered() {
  const q = query.toLowerCase();
  let dataSource = currentMode === 'sell' ? BANK : getBuyModeData();
  
  let filtered = dataSource.filter(item => {
    const nameMatch = !q || item.item.toLowerCase().includes(q) || formatName(item.item).toLowerCase().includes(q);
    return nameMatch && matchFilter(item, filter);
  });
  
  // Sort by price
  filtered.sort((a, b) => {
    return sortOrder === 'desc' ? b.price - a.price : a.price - b.price;
  });
  
  return filtered;
}

// Convert default shop data to the same format as bank data
function getBuyModeData() {
  const buyData = [];
  DEFAULT_SHOP.forEach(category => {
    const categoryName = Object.keys(category)[0];
    const items = category[categoryName];
    items.forEach(item => {
      buyData.push({
        item: item.item,
        price: item.price,
        category: categoryName
      });
    });
  });
  return buyData;
}

// Update matchFilter to work with buy mode categories
function matchFilter(item, f) {
  const [ns, name] = item.item.split(':');
  
  // For buy mode, check the category first
  if (currentMode === 'buy' && item.category) {
    switch(f) {
      case 'all': return true;
      case 'cobble_ball': return item.category === 'Cobble Ball';
      case 'potions': return item.category === 'Potions';
      case 'berries': return item.category === 'Berries';
      case 'gacha': return item.category === 'Gacha';
      case 'utils': return item.category === 'Utils';
      case 'mob_drops': return item.category === 'Mob Drops';
      case 'cards': return item.category === 'Cards';
      case 'vanilla': return ns === 'minecraft';
      case 'cobblemon': return ns === 'cobblemon' || ns === 'lumymon';
      case 'berry': return item.category === 'Berries' || name.includes('berry');
      case 'health': return item.category === 'Potions' || (ns === 'cobblemon' || ns === 'lumymon') && ['potion','elixir','ether','revive','antidote','awakening','burn_heal','ice_heal','paralyze','full_heal','restore','heal_powder','revival_herb'].some(k => name.includes(k));
      case 'evolution': return (ns === 'cobblemon' || ns === 'lumymon') && ['stone','_scale','cable','metal_coat','armor','scroll','_apple','_sweet','razor','kings_rock','dragon_scale','electirizer','magmarizer','upgrade','dubious','peat_block','prism','reaper','deep_sea','sachet','whipped','tart','syrupy','cracked_pot','chipped_pot','teacup','augurite','protector','galarica'].some(k => name.includes(k));
      case 'food': return item.category === 'Food' || ['apple','bread','cake','cookie','pumpkin_pie','cooked','beef','porkchop','chicken','mutton','rabbit','cod','salmon','tropical','pufferfish','rotten_flesh','spider_eye','carrot','potato','baked_potato','poisonous','golden_apple','golden_carrot','melon_slice','dried_kelp','beetroot','beetroot_soup','mushroom_stew','suspicious_stew','rabbit_stew'].some(k => name.includes(k));
      case 'ore': return item.category === 'Ores' || (ns === 'minecraft' && ['_ore','debris','_ingot','_nugget','raw_iron','raw_gold','raw_copper','diamond','emerald','coal','quartz','lapis','redstone','netherite','iron_block','gold_block','emerald_block','diamond_block','coal_block','lapis_block','redstone_block','quartz_block','netherite_block'].some(k => name.includes(k)) && !['stairs','slab','wall','fence','gate','brick','pillar','chiseled','polished','cut','smooth','tile','torch','lamp','horse_armor'].some(k => name.includes(k)));
      case 'armor_tools': return item.category === 'Armor & Tools' || ['sword','pickaxe','_axe','shovel','_hoe','bow','crossbow','trident','fishing_rod','shears','helmet','chestplate','leggings','boots','shield','elytra','turtle_helmet'].some(k => name.includes(k)) && !name.includes('shell_helmet');
      default: return true;
    }
  }
  
  // Original sell mode logic
  switch(f) {
    case 'all': return true;
    case 'vanilla': return ns === 'minecraft';
    case 'cobblemon': return ns === 'cobblemon' || ns === 'lumymon';
    case 'ball': return (ns === 'cobblemon' || ns === 'lumymon') && name.endsWith('_ball');
    case 'berry': return name.includes('berry') && !['candied_berry','berry_sweet','strawberry_sweet'].some(k => name.includes(k));
    case 'health': return (ns === 'cobblemon' || ns === 'lumymon') && ['potion','elixir','ether','revive','antidote','awakening','burn_heal','ice_heal','paralyze','full_heal','restore','heal_powder','revival_herb'].some(k => name.includes(k));
    case 'evolution': return (ns === 'cobblemon' || ns === 'lumymon') && ['stone','_scale','cable','metal_coat','armor','scroll','_apple','_sweet','razor','kings_rock','dragon_scale','electirizer','magmarizer','upgrade','dubious','peat_block','prism','reaper','deep_sea','sachet','whipped','tart','syrupy','cracked_pot','chipped_pot','teacup','augurite','protector','galarica'].some(k => name.includes(k));
    case 'food': return ['apple','bread','cake','cookie','pumpkin_pie','cooked','beef','porkchop','chicken','mutton','rabbit','cod','salmon','tropical','pufferfish','rotten_flesh','spider_eye','carrot','potato','baked_potato','poisonous','golden_apple','golden_carrot','melon_slice','dried_kelp','beetroot','beetroot_soup','mushroom_stew','suspicious_stew','rabbit_stew'].some(k => name.includes(k));
    case 'ore': return ns === 'minecraft' && ['_ore','debris','_ingot','_nugget','raw_iron','raw_gold','raw_copper','diamond','emerald','coal','quartz','lapis','redstone','netherite','iron_block','gold_block','emerald_block','diamond_block','coal_block','lapis_block','redstone_block','quartz_block','netherite_block'].some(k => name.includes(k)) && !['stairs','slab','wall','fence','gate','brick','pillar','chiseled','polished','cut','smooth','tile','torch','lamp','horse_armor'].some(k => name.includes(k));
    case 'armor_tools': return ['sword','pickaxe','_axe','shovel','_hoe','bow','crossbow','trident','fishing_rod','shears','helmet','chestplate','leggings','boots','shield','elytra','turtle_helmet'].some(k => name.includes(k)) && !name.includes('shell_helmet');
    default: return true;
  }
}

// ── RENDER ──
function render() {
  const filtered = getFiltered();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
  if (page > totalPages) page = 1;

  const slice = filtered.slice((page - 1) * PER_PAGE, page * PER_PAGE);

  // Update title based on mode
  const titleElement = document.querySelector('.shop-title h1');
  if (titleElement) {
titleElement.innerHTML = 'COBBLEGAMERS<br>SHOP';
  }

  document.getElementById('statsText').innerHTML =
    `Showing <span>${slice.length}</span> of <span>${total}</span> items`;

  const listEl = document.getElementById('itemList');
  listEl.innerHTML = '';

  if (slice.length === 0) {
    listEl.innerHTML = '<div class="no-results"><div class="icon">🏚</div>No items found...</div>';
  } else {
    slice.forEach((item, i) => {
      const row = document.createElement('div');
      row.className = 'item-row';

      const num = document.createElement('span');
      num.className = 'item-num';
      num.textContent = (page - 1) * PER_PAGE + i + 1;

      const nameEl = document.createElement('span');
      nameEl.className = 'item-name';
      const badge = nsBadge(getNs(item.item));
      nameEl.innerHTML = formatName(item.item);

      const priceEl = document.createElement('span');
      priceEl.className = 'item-price';
      priceEl.textContent = item.price.toLocaleString() + ' ₽';

      row.appendChild(num);
      row.appendChild(makeImgEl(item.item));
      row.appendChild(nameEl);
      row.appendChild(priceEl);
      
      // Add hover events for tooltip
      row.addEventListener('mouseenter', (e) => {
        const tooltip = document.getElementById('itemTooltip');
        const tooltipImage = document.getElementById('tooltipImage');
        const tooltipText = document.querySelector('.tooltip-text');
        const imgEl = row.querySelector('.item-icon, .item-icon-fallback');
        
        if (imgEl && imgEl.tagName === 'IMG') {
          // Has image - show only the image
          tooltipImage.src = imgEl.src;
          tooltipImage.alt = imgEl.alt;
          tooltipImage.style.display = 'block';
          tooltipText.style.display = 'none';
          tooltip.classList.add('show');
        } else {
          // No image - show only question mark
          tooltipImage.style.display = 'none';
          tooltipText.style.display = 'block';
          tooltip.classList.add('show');
        }
      });
      
      row.addEventListener('mouseleave', () => {
        const tooltip = document.getElementById('itemTooltip');
        const tooltipImage = document.getElementById('tooltipImage');
        const tooltipText = document.querySelector('.tooltip-text');
        
        tooltipImage.style.display = 'none';
        tooltipText.style.display = 'none';
        tooltip.classList.remove('show');
      });
      
      listEl.appendChild(row);
    });
  }

  renderPagination(totalPages);
}

}

function renderPagination(totalPages) {
  const pg = document.getElementById('pagination');
  pg.innerHTML = '';
  if (totalPages <= 1) return;

  const addBtn = (label, targetPage, isActive, disabled) => {
    const btn = document.createElement('button');
    btn.className = 'pg-btn' + (isActive ? ' active' : '');
    btn.textContent = label;
    btn.disabled = disabled;
    if (!disabled) btn.onclick = () => {
      page = targetPage;
      render();
      document.querySelector('.panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    pg.appendChild(btn);
  };
  const addEllipsis = () => {
    const s = document.createElement('span');
    s.className = 'pg-ellipsis';
    s.textContent = '…';
    pg.appendChild(s);
  };

  addBtn('◀', page - 1, false, page <= 1);
  let last = 0;
  for (let p = 1; p <= totalPages; p++) {
    if (p === 1 || p === totalPages || (p >= page - 2 && p <= page + 2)) {
      if (last && p - last > 1) addEllipsis();
      addBtn(p, p, p === page, false);
      last = p;
    }
  }
  addBtn('▶', page + 1, false, page >= totalPages);
}

// Main navigation tabs (outside)
document.querySelectorAll('.main-tab-outside').forEach(tab => {
  tab.addEventListener('click', () => {
    const section = tab.dataset.section;
    currentSection = section;
    
    // Update active tab
    document.querySelectorAll('.main-tab-outside').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    
    // Update title dynamically
    const titleElement = document.getElementById('mainTitle');
    if (titleElement) {
      if (section === 'shop') {
        titleElement.innerHTML = 'COBBLEGAMERS<br>SHOP';
      } else if (section === 'gacha') {
        titleElement.innerHTML = 'COBBLEGAMERS<br>GACHA';
      }
    }
    
    // Update body class for color scheme - RESET FIRST
    document.body.className = '';
    
    if (section === 'shop') {
      // Reapply the last shop mode when returning to shop
      document.body.classList.add(lastShopMode === 'buy' ? 'buy-mode' : 'sell-mode');
    } else if (section === 'gacha') {
      document.body.classList.add('gacha-mode');
    }
    
    // Show/hide sections
    document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.content-area').forEach(c => c.classList.remove('active'));
    
    if (section === 'shop') {
      document.getElementById('shopSection').classList.add('active');
      document.getElementById('shopContent').classList.add('active');
      
      // Clear ALL gacha tabs when switching to shop
      document.querySelectorAll('.rarity-tab').forEach(t => t.classList.remove('active'));
      
      // Reset shop tabs to last known mode
      document.querySelectorAll('.shop-tab').forEach(t => t.classList.remove('active'));
      if (lastShopMode === 'buy') {
        document.getElementById('buyPricesTab').classList.add('active');
        currentMode = 'buy';
        document.body.classList.remove('sell-mode');
        document.body.classList.add('buy-mode');
      } else {
        document.getElementById('sellPricesTab').classList.add('active');
        currentMode = 'sell';
        document.body.classList.remove('buy-mode');
        document.body.classList.add('sell-mode');
      }
      render();
      
    } else if (section === 'gacha') {
      document.getElementById('gachaSection').classList.add('active');
      
      // Re-render current gacha type when switching back to gacha
      if (currentGachaType === 'pokedoll') {
        renderPokedollGacha();
      } else if (currentGachaType === 'item') {
        renderItemGacha();
      }
    }
  });
});

// Update categories based on current mode
function updateCategories(mode) {
  const filterTabs = document.getElementById('filterTabs');
  if (!filterTabs) return;
  
  filterTabs.innerHTML = '';
  
  if (mode === 'buy') {
    // Always add "All" tab first
    const allTab = document.createElement('div');
    allTab.className = 'tab active';
    allTab.dataset.filter = 'all';
    allTab.textContent = 'All';
    filterTabs.appendChild(allTab);
    // Then add categories from default_shop.json
    DEFAULT_SHOP.forEach(category => {
      const categoryName = Object.keys(category)[0];
      const tab = document.createElement('div');
      tab.className = 'tab';
      tab.dataset.filter = categoryName.toLowerCase().replace(/\s+/g, '_');
      tab.textContent = categoryName;
      filterTabs.appendChild(tab);
    });
  } else {
    // Use original sell categories
    const sellCategories = [
      { name: 'All', filter: 'all' },
      { name: 'Vanilla', filter: 'vanilla' },
      { name: 'Cobblemon', filter: 'cobblemon' },
      { name: 'PokeBalls', filter: 'ball' },
      { name: 'Berries', filter: 'berry' },
      { name: 'Health Items', filter: 'health' },
      { name: 'Evolutions & Held Items', filter: 'evolution' },
      { name: 'Food', filter: 'food' },
      { name: 'Ores', filter: 'ore' },
      { name: 'Armor & Tools', filter: 'armor_tools' }
    ];
    
    sellCategories.forEach(cat => {
      const tab = document.createElement('div');
      tab.className = 'tab';
      tab.dataset.filter = cat.filter;
      tab.textContent = cat.name;
      if (cat.filter === 'all') tab.classList.add('active');
      filterTabs.appendChild(tab);
    });
  }
  
  // Reset filter to 'all' when switching modes
  filter = 'all';
}
