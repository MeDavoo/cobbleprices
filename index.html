,{"item":"minecraft:piglin_brute_spawn_egg","price":60},{"item":"minecraft:pillager_spawn_egg","price":60},{"item":"minecraft:polar_bear_spawn_egg","price":80},{"item":"minecraft:pufferfish_spawn_egg","price":40},{"item":"minecraft:rabbit_spawn_egg","price":40},{"item":"minecraft:ravager_spawn_egg","price":60},{"item":"minecraft:salmon_spawn_egg","price":40},{"item":"minecraft:sheep_spawn_egg","price":40},{"item":"minecraft:shulker_spawn_egg","price":60},{"item":"minecraft:silverfish_spawn_egg","price":60},{"item":"minecraft:skeleton_spawn_egg","price":60},{"item":"minecraft:skeleton_horse_spawn_egg","price":60},{"item":"minecraft:slime_spawn_egg","price":40},{"item":"minecraft:spider_spawn_egg","price":60},{"item":"minecraft:squid_spawn_egg","price":40},{"item":"minecraft:stray_spawn_egg","price":60},{"item":"minecraft:strider_spawn_egg","price":80},{"item":"minecraft:tadpole_spawn_egg","price":40},{"item":"minecraft:trader_llama_spawn_egg","price":40},{"item":"minecraft:tropical_fish_spawn_egg","price":40},{"item":"minecraft:turtle_spawn_egg","price":80},{"item":"minecraft:vex_spawn_egg","price":60},{"item":"minecraft:villager_spawn_egg","price":40},{"item":"minecraft:vindicator_spawn_egg","price":60},{"item":"minecraft:wandering_trader_spawn_egg","price":40},{"item":"minecraft:warden_spawn_egg","price":500},{"item":"minecraft:witch_spawn_egg","price":60},{"item":"minecraft:wither_skeleton_spawn_egg","price":60},{"item":"minecraft:wolf_spawn_egg","price":40},{"item":"minecraft:zoglin_spawn_egg","price":60},{"item":"minecraft:zombie_spawn_egg","price":60},{"item":"minecraft:zombie_horse_spawn_egg","price":60},{"item":"minecraft:zombie_villager_spawn_egg","price":60},{"item":"minecraft:zombified_piglin_spawn_egg","price":60},{"item":"minecraft:player_head","price":999},{"item":"minecraft:command_block_minecart","price":15},{"item":"minecraft:knowledge_book","price":50},{"item":"minecraft:debug_stick","price":999},{"item":"minecraft:frogspawn","price":5}];

const PER_PAGE = 30;
let page = 1, filter = 'all', query = '';

// ── CDN image sources to try in order ──
function getImgUrl(itemId) {
  const [ns, name] = itemId.split(':');
  if (ns === 'minecraft') {
    return `https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20.1/assets/minecraft/textures/item/${name}.png`;
  }
  if (ns === 'cobblemon' || ns === 'lumymon') {
    return `https://mc.nbs.gg/items/${ns}/${name}.png`;
  }
  return null;
}

// Fallback chain per image
function makeImgEl(itemId) {
  const [ns, name] = itemId.split(':');
  const el = document.createElement('img');
  el.className = 'item-icon';
  el.alt = name;

  if (ns === 'minecraft') {
    // Try GitHub raw assets → fallback to wiki sprite → fallback icon
    el.src = `https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.20.1/assets/minecraft/textures/item/${name}.png`;
    let tries = 0;
    el.onerror = function() {
      tries++;
      if (tries === 1) {
        el.src = `https://minecraft.wiki/images/Invicon_${name.split('_').map(w=>w[0].toUpperCase()+w.slice(1)).join('_')}.png`;
      } else {
        el.outerHTML = '<div class="item-icon-fallback">◻</div>';
      }
    };
  } else {
    el.src = `https://mc.nbs.gg/items/${ns}/${name}.png`;
    el.onerror = function() {
      el.outerHTML = '<div class="item-icon-fallback">◻</div>';
    };
  }
  return el;
}

function formatName(itemId) {
  return itemId.split(':')[1].replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase());
}

function getNs(itemId) { return itemId.split(':')[0]; }

function nsBadge(ns) {
  if (ns === 'cobblemon') return '🔴';
  if (ns === 'lumymon')   return '🌙';
  return '';
}

function matchFilter(item, f) {
  const [ns, name] = item.item.split(':');
  switch(f) {
    case 'all':       return true;
    case 'cobblemon': return ns === 'cobblemon' || ns === 'lumymon';
    case 'lumymon':   return ns === 'lumymon';
    case 'berry':     return name.includes('berry');
    case 'potion':    return ['potion','elixir','ether','revive','antidote','awakening','burn_heal','ice_heal','paralyze','full_heal','restore','heal_powder','revival_herb'].some(k => name.includes(k));
    case 'evolution': return ['stone','_scale','cable','metal_coat','armor','scroll','_apple','_sweet','razor','kings_rock','dragon_scale','electirizer','magmarizer','upgrade','dubious','peat_block','prism','reaper','deep_sea','sachet','whipped','tart','syrupy','cracked_pot','chipped_pot','teacup','augurite','protector','galarica'].some(k => name.includes(k));
    case 'food':      return ns === 'cobblemon' && ['cookie','cake','curry','muffin','mochi','sandwich','stew','milk','tea','galette','malasada','crunchies','bar','candy','ponigiri','gateau','dip','tail','bait','snack','leek','moomoo','sinister','pewter','rage','lava','lumiose','casteliac','potato_m','open_faced','tasty','vivichoke','roasted','jubilife','big_m'].some(k => name.includes(k));
    case 'ore':       return ['_ore','debris','_ingot','_nugget','raw_iron','raw_gold','raw_copper','diamond','emerald','coal','quartz','lapis','netherite'].some(k => name.includes(k)) && ns === 'minecraft';
    case 'tool':      return ['sword','pickaxe','_axe','shovel','_hoe','bow','crossbow','trident','fishing_rod','shears'].some(k => name.includes(k));
    case 'armor':     return ['helmet','chestplate','leggings','boots','shield','elytra','turtle_helmet'].some(k => name.includes(k));
    default: return true;
  }
}

function getFiltered() {
  const q = query.toLowerCase();
  return BANK.filter(item => {
    const nameMatch = !q || item.item.toLowerCase().includes(q) || formatName(item.item).toLowerCase().includes(q);
    return nameMatch && matchFilter(item, filter);
  });
}

function render() {
  const filtered = getFiltered();
  const total = filtered.length;
  const totalPages = Math.max(1, Math.ceil(total / PER_PAGE));
  if (page > totalPages) page = 1;

  const slice = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);

  document.getElementById('statsText').innerHTML =
    `Showing <span>${slice.length}</span> of <span>${total}</span> items`;

  const listEl = document.getElementById('itemList');
  listEl.innerHTML = '';

  if (slice.length === 0) {
    listEl.innerHTML = '<div class="no-results"><div class="icon">🏚</div>No items found...</div>';
  } else {
    slice.forEach((item, i) => {
      const row = document.createElement('div');
      row.className = 'item-row';

      const num = document.createElement('span');
      num.className = 'item-num';
      num.textContent = (page-1)*PER_PAGE + i + 1;

      const imgEl = makeImgEl(item.item);

      const nameEl = document.createElement('span');
      nameEl.className = 'item-name';
      const badge = nsBadge(getNs(item.item));
      nameEl.innerHTML = formatName(item.item) + (badge ? ` <span class="ns-badge">${badge}</span>` : '');

      const priceEl = document.createElement('span');
      priceEl.className = 'item-price';
      priceEl.textContent = item.price.toLocaleString() + ' ₽';

      row.appendChild(num);
      row.appendChild(imgEl);
      row.appendChild(nameEl);
      row.appendChild(priceEl);
      listEl.appendChild(row);
    });
  }

  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }
  pg.innerHTML = '';

  const addBtn = (label, targetPage, isActive, disabled) => {
    const btn = document.createElement('button');
    btn.className = 'pg-btn' + (isActive ? ' active' : '');
    btn.textContent = label;
    btn.disabled = disabled;
    if (!disabled) btn.onclick = () => { page = targetPage; render(); document.querySelector('.panel').scrollIntoView({behavior:'smooth',block:'start'}); };
    pg.appendChild(btn);
  };
  const addEllipsis = () => {
    const s = document.createElement('span');
    s.className = 'pg-ellipsis';
    s.textContent = '…';
    pg.appendChild(s);
  };

  addBtn('◀', page-1, false, page <= 1);

  let last = 0;
  for (let p = 1; p <= totalPages; p++) {
    if (p === 1 || p === totalPages || (p >= page-2 && p <= page+2)) {
      if (last && p - last > 1) addEllipsis();
      addBtn(p, p, p === page, false);
      last = p;
    }
  }

  addBtn('▶', page+1, false, page >= totalPages);
}

// Events
document.getElementById('search').addEventListener('input', e => {
  query = e.target.value; page = 1; render();
});
document.getElementById('filterTabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  filter = tab.dataset.filter;
  page = 1; render();
});

render();
</script>
